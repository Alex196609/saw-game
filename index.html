<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Страшная математическая игра</title>

    <link rel="stylesheet" href="style.css?v=23" />
  </head>

  <body>
    <div id="startScreen">
      <h1>Страшная игра по математике</h1>

      <label for="difficulty">Сложность</label>
      <select id="difficulty">
        <option value="5">Лёгкий</option>
        <option value="10">Средний</option>
        <option value="20">Сложный</option>
      </select>

      <label for="mode">Режим</label>
      <select id="mode">
        <option value="normal">Обычный</option>
        <option value="marathon">Марафон 60 сек</option>
      </select>

      <label for="playerName">Имя игрока</label>
      <input
        type="text"
        id="playerName"
        placeholder="Введи своё имя"
        maxlength="20"
      />

      <button type="button" onclick="startGame()">Начать игру</button>

      <!-- ДОБАВЛЕНО: сброс обучения -->
      <button id="resetLearningButton" type="button">
        Сбросить обучение
      </button>

      <!-- ДОБАВЛЕНО: топ проблемных примеров -->
      <div id="problemsBox" style="display:none; margin-top:12px;">
        <h2 style="margin: 10px 0 6px;">Самые проблемные примеры</h2>
        <div id="problemsList"></div>
      </div>
    </div>

    <div id="game" style="display:none;">
      <div id="task"></div>

      <input
        id="answer"
        type="number"
        inputmode="numeric"
        pattern="[0-9]*"
        autocomplete="off"
        enterkeyhint="done"
        placeholder="Ответ"
        onkeydown="checkEnter(event)"
      />
      <br /><br />

      <button id="checkButton" type="button" onclick="check()">Ответить</button>

      <div id="timer"></div>

      <div id="score">Очки: 0</div>
      <div id="lastScore">Прошлый результат: 0</div>

      <div id="mistakesBox" style="display:none;">
        <h2>Ошибки в марафоне</h2>
        <div id="mistakesList"></div>
        <button type="button" onclick="restartToMenu()">Играть снова</button>
      </div>
    </div>

    <img id="doll" src="3kota.jpg" />

    <!-- Скрипт стоит внизу body — это хорошо (DOM уже загружен) -->
    <script src="script.js?v=23"></script>
  </body>
</html>
